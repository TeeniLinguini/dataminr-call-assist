    --gov-tint: #eaf6f5;

    --corp: #5b4fe9;
    --corp-tint: #f1f0fe;
    --corp-tint-strong: #e4e1fd;

    margin: 0 auto;
    padding: 0 24px 80px;
  }

    padding: 56px 24px 40px;
    border-bottom: 1px solid var(--border-soft);
  }

  .hero-glow {

    right: -180px;

    height: 560px;

    position: relative;
    max-width: 920px;
    margin: 0 auto;
  }

    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(30px, 4.4vw, 42px);
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0;

    font-size: 11px;

    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 16px;
  }

    height: 20px;
    border-radius: 50%;
    background: var(--ink);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
  }

  .step-label.done .num {
    background: var(--accent);
  }

    grid-template-columns: repeat(3, 1fr);

    text-align: left;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--bg);
    border-radius: var(--radius);
    padding: 20px;
    transition: border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
    font-family: inherit;
  }

  .v-card:hover { transform: translateY(-1px); }

    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 999px;
    margin-bottom: 12px;

    font-size: 17px;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }

    color: var(--ink-soft);

  }

    font-weight: 600;

    text-transform: uppercase;

    justify-content: space-between;
    gap: 16px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 15px 18px;
    text-decoration: none;
    color: var(--ink);
    transition: border-color 0.15s ease, background 0.15s ease;

    font-size: 14.5px;
    margin-bottom: 2px;

  .cs-item .cs-line {

    font-size: 18px;

    justify-content: flex-end;
    margin-top: 28px;
  }

  .reset-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 999px;
    padding: 8px 16px;
    color: var(--ink-soft);
    cursor: pointer;
  }

  .reset-btn:hover { border-color: var(--ink); color: var(--ink); }

</style>
</head>

let state = { vertical: null, tier: null, openerIndex: 0 };

function renderVerticals() {
  const grid = document.getElementById('vertical-grid');
  grid.innerHTML = Object.keys(DATA).map(key => {
    const v = DATA[key];
    return `<button class="v-card" data-v="${v.tagClass}" onclick="selectVertical('${key}')">
      <span class="v-tag">${v.short}</span>
      <h3>${v.label}</h3>
      <p>${v.tagline}</p>
    </button>`;
  }).join('');
}

function selectVertical(key) {
  state.vertical = key;
  state.tier = null;
  state.openerIndex = 0;

  document.querySelectorAll('.v-card').forEach(el => el.classList.remove('active'));
  document.querySelector(`.v-card[data-v="${DATA[key].tagClass}"]`).classList.add('active');

  document.documentElement.style.setProperty('--accent', DATA[key].accent);
  document.documentElement.style.setProperty('--accent-tint', `var(--${DATA[key].tagClass}-tint)`);
  document.documentElement.style.setProperty('--accent-tint-strong', `var(--${DATA[key].tagClass}-tint-strong)`);

  renderTiers();
  document.getElementById('tier-section').classList.add('visible');
  document.getElementById('label-1').classList.add('done');
  document.getElementById('results').classList.remove('visible');

  document.getElementById('tier-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderTiers() {
  const v = DATA[state.vertical];
  const grid = document.getElementById('tier-grid');
  grid.innerHTML = v.tiers.map(t => {
    return `<button class="t-card" data-t="${t.id}" onclick="selectTier('${t.id}')">
      <span class="t-sub">${t.sub}</span>
      <h4>${t.title}</h4>
    </button>`;
  }).join('');
}

function selectTier(id) {
  state.tier = id;
  state.openerIndex = 0;
  document.querySelectorAll('.t-card').forEach(el => el.classList.remove('active'));
  document.querySelector(`.t-card[data-t="${id}"]`).classList.add('active');
  document.getElementById('label-2').classList.add('done');
  renderResults();
}

function together(t, peers, useText, benefitText) {
  return `We help <b>${t.persona}</b> at organizations like <b>${peers}</b> who use Dataminr to <b>${useText}</b>, which helps them <b>${benefitText}</b>.`;
}

function vpBlock(label, t, tier) {
  return `
    <div class="card-block">
      <div class="card-eyebrow"><span class="dot"></span>${label}</div>
      <div class="vp-row"><span class="vp-label">Persona</span><span class="vp-value">${tier.persona}</span></div>
      <div class="vp-row"><span class="vp-label">Peers</span><span class="vp-value">${tier.peers}</span></div>
      <div class="vp-row"><span class="vp-label">How they use it</span><span class="vp-value">${t.use}</span></div>
      <div class="vp-row"><span class="vp-label">How they benefit</span><span class="vp-value">${t.benefit}</span></div>
      <div class="vp-together">${together(tier, tier.peers, t.use, t.benefit)}</div>
    </div>
  `;
}

function openerBlock(t) {
  const dots = t.openers.map((_, i) =>
    `<button class="opener-dot ${i === state.openerIndex ? 'active' : ''}" onclick="setOpener(${i})" aria-label="Option ${i + 1}"></button>`
  ).join('');

  return `
    <div class="card-block opener">
      <div class="card-eyebrow"><span class="dot"></span>Opening line</div>
      <p class="copy" id="opener-text">${t.openers[state.openerIndex]}</p>
      <div class="opener-nav">
        <button class="opener-arrow" onclick="stepOpener(-1)" aria-label="Previous">&#8592;</button>
        <div class="opener-dots">${dots}</div>
        <button class="opener-arrow" onclick="stepOpener(1)" aria-label="Next">&#8594;</button>
      </div>
    </div>
  `;
}

function setOpener(i) {
  state.openerIndex = i;
  renderResults();
}

function stepOpener(delta) {
  const v = DATA[state.vertical];
  const t = v.tiers.find(x => x.id === state.tier);
  const len = t.openers.length;
  state.openerIndex = (state.openerIndex + delta + len) % len;
  renderResults();
}

function renderResults() {
  const v = DATA[state.vertical];
  const t = v.tiers.find(x => x.id === state.tier);
  const results = document.getElementById('results');

  results.innerHTML = `
    <div class="result-head">
      <h2>${t.title}</h2>
      <span class="r-tag">${v.label}</span>
    </div>

    ${openerBlock(t)}

    <div class="two-up">
      ${vpBlock('10 second value proposition', t.ten, t)}
      ${vpBlock('30 second value proposition', t.thirty, t)}
    </div>

    <div class="cs-heading">Case studies to point to</div>
    <div class="cs-list">
      ${v.caseStudies.map(cs => `
        <a class="cs-item" href="${cs.url}" target="_blank" rel="noopener">
          <div class="cs-text">
            <div class="cs-name">${cs.name}</div>
            <div class="cs-line">${cs.line}</div>
          </div>
          <span class="cs-arrow">&#8594;</span>
        </a>
      `).join('')}
    </div>

    <div class="reset-row">
      <button class="reset-btn" onclick="resetAll()">Start over</button>
    </div>
  `;

  results.classList.add('visible');
  results.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetAll() {
  state = { vertical: null, tier: null, openerIndex: 0 };
  document.querySelectorAll('.v-card').forEach(el => el.classList.remove('active'));
  document.getElementById('tier-section').classList.remove('visible');
  document.getElementById('results').classList.remove('visible');
  document.getElementById('label-1').classList.remove('done');
  document.getElementById('label-2').classList.remove('done');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderVerticals();
</script>

</body>
</html>
